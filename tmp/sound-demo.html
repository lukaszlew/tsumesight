<!DOCTYPE html>
<html><body style="font-family:system-ui;padding:2em;background:#222;color:#eee">
<style>
  button { font-size:1.1em; padding:.3em .6em; margin:.2em; cursor:pointer }
  h2 { margin-top:1.2em; font-size:1.1em }
  table { border-collapse:collapse; margin:1em 0 }
  th { color:#aaa; padding:.3em .8em; font-size:.9em }
  td { padding:.2em }
</style>

<h1>2:N:M grid — 300ms total</h1>
<p style="color:#888">Rows = glide (N), Columns = hold target (M), all with hold base = 2</p>

<table>
<tr><th></th><th>M=1</th><th>M=2</th><th>M=4</th><th>M=6</th><th>M=8</th></tr>
<tr><th>N=1</th><td id="r1c1"></td><td id="r1c2"></td><td id="r1c4"></td><td id="r1c6"></td><td id="r1c8"></td></tr>
<tr><th>N=2</th><td id="r2c1"></td><td id="r2c2"></td><td id="r2c4"></td><td id="r2c6"></td><td id="r2c8"></td></tr>
<tr><th>N=4</th><td id="r4c1"></td><td id="r4c2"></td><td id="r4c4"></td><td id="r4c6"></td><td id="r4c8"></td></tr>
<tr><th>N=6</th><td id="r6c1"></td><td id="r6c2"></td><td id="r6c4"></td><td id="r6c6"></td><td id="r6c8"></td></tr>
<tr><th>N=8</th><td id="r8c1"></td><td id="r8c2"></td><td id="r8c4"></td><td id="r8c6"></td><td id="r8c8"></td></tr>
</table>

<script>
let ctx = new AudioContext()
let max = 5, base = 330, total = 0.3

function r(v) { return 1 + (v - 1) / (max - 1) * 2 }

function playGlide(v, ratios) {
  let t = ctx.currentTime, target = base * r(v)
  let sum = ratios[0] + ratios[1] + ratios[2]
  let hold1 = total * ratios[0] / sum
  let glide = total * ratios[1] / sum

  let osc = ctx.createOscillator()
  let gain = ctx.createGain()
  osc.type = 'triangle'
  osc.frequency.setValueAtTime(base, t)
  if (hold1 > 0) osc.frequency.setValueAtTime(base, t + hold1)
  osc.frequency.linearRampToValueAtTime(target, t + hold1 + glide)
  gain.gain.setValueAtTime(0.15, t)
  gain.gain.exponentialRampToValueAtTime(0.001, t + total)
  osc.connect(gain).connect(ctx.destination)
  osc.start(t); osc.stop(t + total)
}

function makeButtons(id, ratios) {
  let el = document.getElementById(id)
  for (let v = 1; v <= 5; v++) {
    let btn = document.createElement('button')
    btn.textContent = v === 5 ? '5+' : v
    btn.onclick = () => playGlide(v, ratios)
    el.appendChild(btn)
  }
}

let ns = [1,2,4,6,8]
let ms = [1,2,4,6,8]
for (let n of ns) {
  for (let m of ms) {
    makeButtons(`r${n}c${m}`, [2, n, m])
  }
}
</script>
</body></html>
