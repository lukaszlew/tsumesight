<!DOCTYPE html>
<html><body style="font-family:system-ui;padding:2em;background:#222;color:#eee">
<style>
  button { font-size:1.1em; padding:.5em 1em; margin:.25em; cursor:pointer; min-width: 16em; text-align:left }
  h2 { margin-top:1.4em; font-size:1.15em; color:#ffd }
  .row { margin:.3em 0 }
  p.hint { color:#888; font-size:.9em; margin:.2em 0 }
  .tier { border-left: 3px solid #444; padding-left: 1em; margin-bottom: 1.2em }
  .chosen { background:#2a4; color:#fff; border:none }
</style>

<h1>Completion sound candidates</h1>

<div class="tier">
<h2>Wrong answer — softer alternatives</h2>
<p class="hint">Goal: acknowledge "not this one" without feeling like a scolding. Current is loud/long.</p>
<div class="row"><button class="chosen" onclick="wrongA()">A — Current (130 Hz triangle, 450 ms)</button></div>
<div class="row"><button onclick="wrongB()">B — Soft low thump (110 Hz sine, 120 ms)</button></div>
<div class="row"><button onclick="wrongC()">C — Double descend (500→330 Hz triangles)</button></div>
<div class="row"><button onclick="wrongD()">D — Muted low pluck (165 Hz, short)</button></div>
<div class="row"><button onclick="wrongE()">E — Wood knock (filtered click ~200 Hz)</button></div>
<div class="row"><button onclick="wrongF()">F — Soft minor second (440+466 Hz, 150 ms)</button></div>
</div>

<div class="tier">
<h2>Basic (0–3 ★) — chosen</h2>
<div class="row"><button class="chosen" onclick="basicC()">Quick plucked triad C E G</button></div>
</div>

<div class="tier">
<h2>Medal 🏅 (4 ★) — variations on plucked triad</h2>
<div class="row"><button onclick="medalA()">A — Pluck C E G → octave-up pluck C E G</button></div>
<div class="row"><button onclick="medalB()">B — Pluck C E G → pluck G B D (double arp)</button></div>
<div class="row"><button onclick="medalC()">C — Pluck triad + held pluck chord</button></div>
<div class="row"><button onclick="medalD()">D — Fast double arp pluck (C maj → G maj)</button></div>
<div class="row"><button onclick="medalE()">E — Pluck triad + sparkle plucks on top</button></div>
<div class="row"><button onclick="medalF()">F — Pluck triad → single high pluck ring</button></div>
</div>

<div class="tier">
<h2>Trophy 🏆 (5 ★)</h2>
<div class="row"><button onclick="trophyA()">A — Plucked cascade + big pluck chord</button></div>
<div class="row"><button onclick="trophyB()">B — Long brass ascending fanfare</button></div>
<div class="row"><button onclick="trophyC()">C — Sparkly pluck cascade + chord</button></div>
<div class="row"><button onclick="trophyD()">D — Triple burst (plucked)</button></div>
<div class="row"><button onclick="trophyE()">E — Triple fanfare burst (triangle)</button></div>
<div class="row"><button onclick="trophyF()">F — Double arp cascade + shimmer</button></div>
</div>

<script type="module">
let ctx = null
function getCtx() {
  if (!ctx) ctx = new AudioContext({ latencyHint: 'interactive' })
  if (ctx.state === 'suspended') ctx.resume()
  return ctx
}

function note(c, freq, t, dur, vol, type = 'triangle') {
  let osc = c.createOscillator()
  let gain = c.createGain()
  osc.type = type
  osc.frequency.value = freq
  gain.gain.setValueAtTime(0.001, t)
  gain.gain.linearRampToValueAtTime(vol, t + 0.02)
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur)
  osc.connect(gain).connect(c.destination)
  osc.start(t); osc.stop(t + dur)
}

function pluck(c, freq, t, vol, decay) {
  for (let h of [1, 2, 3, 4]) {
    let osc = c.createOscillator()
    let gain = c.createGain()
    osc.type = 'sine'
    osc.frequency.value = freq * h
    let v = vol / (h * h)
    let d = decay / h
    gain.gain.setValueAtTime(0.001, t)
    gain.gain.linearRampToValueAtTime(v, t + 0.003)
    gain.gain.exponentialRampToValueAtTime(0.001, t + d)
    osc.connect(gain).connect(c.destination)
    osc.start(t); osc.stop(t + d)
  }
}

// ---------- WRONG ANSWER ----------

// A: current — 130 Hz triangle, 450 ms
window.wrongA = function () {
  let c = getCtx(), t = c.currentTime
  let osc = c.createOscillator(), gain = c.createGain()
  osc.type = 'triangle'; osc.frequency.value = 130
  gain.gain.setValueAtTime(0.001, t)
  gain.gain.linearRampToValueAtTime(0.24, t + 0.05)
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45)
  osc.connect(gain).connect(c.destination)
  osc.start(t); osc.stop(t + 0.45)
}

// B: soft low thump — short sine, gentle attack
window.wrongB = function () {
  let c = getCtx(), t = c.currentTime
  let osc = c.createOscillator(), gain = c.createGain()
  osc.type = 'sine'; osc.frequency.value = 110
  gain.gain.setValueAtTime(0.001, t)
  gain.gain.linearRampToValueAtTime(0.18, t + 0.015)
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12)
  osc.connect(gain).connect(c.destination)
  osc.start(t); osc.stop(t + 0.12)
}

// C: double descend — "try again" feel
window.wrongC = function () {
  let c = getCtx(), t = c.currentTime
  for (let i = 0; i < 2; i++) {
    let osc = c.createOscillator(), gain = c.createGain()
    osc.type = 'triangle'
    osc.frequency.value = i === 0 ? 500 : 330
    gain.gain.setValueAtTime(0.3, t + i * 0.06)
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.08)
    osc.connect(gain).connect(c.destination)
    osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.08)
  }
}

// D: muted low pluck — neutral acknowledgement
window.wrongD = function () {
  let c = getCtx(), t = c.currentTime
  pluck(c, 165, t, 0.22, 0.18)
}

// E: wood knock — short filtered click
window.wrongE = function () {
  let c = getCtx(), t = c.currentTime
  // Narrow burst: short noise-ish via quick sweep
  let osc = c.createOscillator(), gain = c.createGain()
  osc.type = 'square'
  osc.frequency.setValueAtTime(300, t)
  osc.frequency.exponentialRampToValueAtTime(90, t + 0.05)
  gain.gain.setValueAtTime(0.18, t)
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06)
  let filter = c.createBiquadFilter()
  filter.type = 'lowpass'; filter.frequency.value = 700
  osc.connect(filter); filter.connect(gain); gain.connect(c.destination)
  osc.start(t); osc.stop(t + 0.06)
}

// F: soft minor second — gentle "hm" dissonance, brief
window.wrongF = function () {
  let c = getCtx(), t = c.currentTime
  for (let freq of [440, 466]) {
    let osc = c.createOscillator(), gain = c.createGain()
    osc.type = 'sine'; osc.frequency.value = freq
    gain.gain.setValueAtTime(0.001, t)
    gain.gain.linearRampToValueAtTime(0.09, t + 0.02)
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15)
    osc.connect(gain).connect(c.destination)
    osc.start(t); osc.stop(t + 0.15)
  }
}

// ---------- BASIC ----------
window.basicC = function () {
  let c = getCtx(), t0 = c.currentTime
  pluck(c, 523, t0, 0.18, 0.3)
  pluck(c, 659, t0 + 0.07, 0.18, 0.3)
  pluck(c, 784, t0 + 0.14, 0.18, 0.5)
}

// ---------- MEDAL — pluck-based variations ----------

// A: Pluck C E G, then octave up C E G
window.medalA = function () {
  let c = getCtx(), t0 = c.currentTime
  pluck(c, 523, t0, 0.16, 0.25)
  pluck(c, 659, t0 + 0.07, 0.16, 0.25)
  pluck(c, 784, t0 + 0.14, 0.16, 0.25)
  pluck(c, 1047, t0 + 0.25, 0.18, 0.35)
  pluck(c, 1319, t0 + 0.32, 0.18, 0.35)
  pluck(c, 1568, t0 + 0.39, 0.18, 0.55)
}

// B: Pluck C E G, then pluck G B D (double arpeggio, two chords)
window.medalB = function () {
  let c = getCtx(), t0 = c.currentTime
  pluck(c, 523, t0, 0.16, 0.25)
  pluck(c, 659, t0 + 0.07, 0.16, 0.25)
  pluck(c, 784, t0 + 0.14, 0.16, 0.3)
  pluck(c, 784, t0 + 0.28, 0.18, 0.3)
  pluck(c, 988, t0 + 0.35, 0.18, 0.3)
  pluck(c, 1175, t0 + 0.42, 0.18, 0.55)
}

// C: Pluck triad then all three ring together as a held chord
window.medalC = function () {
  let c = getCtx(), t0 = c.currentTime
  pluck(c, 523, t0, 0.16, 0.25)
  pluck(c, 659, t0 + 0.07, 0.16, 0.25)
  pluck(c, 784, t0 + 0.14, 0.16, 0.25)
  // Held chord — longer decay
  pluck(c, 1047, t0 + 0.26, 0.14, 0.8)
  pluck(c, 1319, t0 + 0.26, 0.14, 0.8)
  pluck(c, 1568, t0 + 0.26, 0.14, 0.8)
}

// D: Fast double arpeggio — C maj then G maj, tighter spacing
window.medalD = function () {
  let c = getCtx(), t0 = c.currentTime
  let arp1 = [523, 659, 784, 1047]
  let arp2 = [784, 988, 1175, 1568]
  arp1.forEach((f, i) => pluck(c, f, t0 + i * 0.05, 0.14, 0.2))
  arp2.forEach((f, i) => pluck(c, f, t0 + 0.24 + i * 0.05, 0.16, 0.3))
  // Final note rings
  pluck(c, 1568, t0 + 0.44, 0.16, 0.7)
}

// E: Pluck triad + sparkle plucks cascading high
window.medalE = function () {
  let c = getCtx(), t0 = c.currentTime
  pluck(c, 523, t0, 0.16, 0.25)
  pluck(c, 659, t0 + 0.07, 0.16, 0.25)
  pluck(c, 784, t0 + 0.14, 0.16, 0.3)
  // High sparkle plucks
  pluck(c, 1568, t0 + 0.25, 0.1, 0.2)
  pluck(c, 2093, t0 + 0.30, 0.1, 0.2)
  pluck(c, 2637, t0 + 0.35, 0.1, 0.25)
  pluck(c, 3136, t0 + 0.40, 0.08, 0.3)
}

// F: Pluck triad, then single high pluck that rings long
window.medalF = function () {
  let c = getCtx(), t0 = c.currentTime
  pluck(c, 523, t0, 0.16, 0.25)
  pluck(c, 659, t0 + 0.07, 0.16, 0.25)
  pluck(c, 784, t0 + 0.14, 0.16, 0.3)
  pluck(c, 1568, t0 + 0.28, 0.2, 1.0)
}

// ---------- TROPHY ----------

// A: Plucked cascade up then big pluck chord
window.trophyA = function () {
  let c = getCtx(), t0 = c.currentTime
  let cascade = [523, 659, 784, 988, 1175, 1319, 1568, 2093]
  cascade.forEach((f, i) => pluck(c, f, t0 + i * 0.045, 0.14, 0.3))
  let chordT = t0 + 0.45
  for (let f of [523, 784, 1047, 1319, 1568, 2093]) pluck(c, f, chordT, 0.12, 1.0)
}

// B: Long brass ascending fanfare (sawtooth → triangle chord)
window.trophyB = function () {
  let c = getCtx(), t0 = c.currentTime
  let seq = [392, 523, 659, 784, 1047, 1319, 1568]
  seq.forEach((f, i) => note(c, f, t0 + i * 0.12, 0.22, 0.12, 'sawtooth'))
  let chordT = t0 + seq.length * 0.12 + 0.05
  for (let f of [784, 1047, 1319, 1568]) note(c, f, chordT, 1.4, 0.08, 'triangle')
  note(c, 2093, chordT, 1.4, 0.05, 'sine')
}

// C: Sparkly pluck cascade + triumphant chord
window.trophyC = function () {
  let c = getCtx(), t0 = c.currentTime
  let cascade = [523, 659, 784, 988, 1175, 1319, 1568, 1976, 2093]
  cascade.forEach((f, i) => pluck(c, f, t0 + i * 0.04, 0.15, 0.4))
  let chordT = t0 + 0.45
  for (let f of [523, 659, 784, 1047, 1319, 1568, 2093]) note(c, f, chordT, 1.3, 0.06)
}

// D: Triple plucked bursts ascending
window.trophyD = function () {
  let c = getCtx(), t0 = c.currentTime
  let bursts = [[523, 659, 784], [659, 784, 988], [784, 988, 1175]]
  bursts.forEach((burst, bi) => {
    burst.forEach((f, i) => pluck(c, f, t0 + bi * 0.22 + i * 0.05, 0.14, 0.25))
  })
  let chordT = t0 + 0.78
  for (let f of [1047, 1319, 1568, 2093]) pluck(c, f, chordT, 0.14, 1.2)
}

// E: Triple fanfare burst (triangle, original)
window.trophyE = function () {
  let c = getCtx(), t0 = c.currentTime
  let bursts = [[523, 659, 784], [659, 784, 988], [784, 988, 1175]]
  bursts.forEach((burst, bi) => {
    burst.forEach((f, i) => note(c, f, t0 + bi * 0.25 + i * 0.05, 0.12, 0.11))
  })
  let chordT = t0 + 0.85
  for (let f of [1047, 1319, 1568, 2093]) note(c, f, chordT, 1.4, 0.09)
  note(c, 2637, chordT + 0.1, 1.0, 0.05, 'sine')
}

// F: Double pluck arp cascade + high shimmer
window.trophyF = function () {
  let c = getCtx(), t0 = c.currentTime
  // C major cascade
  let arp1 = [523, 659, 784, 1047]
  arp1.forEach((f, i) => pluck(c, f, t0 + i * 0.05, 0.14, 0.25))
  // G major cascade, higher
  let arp2 = [784, 988, 1175, 1568]
  arp2.forEach((f, i) => pluck(c, f, t0 + 0.25 + i * 0.05, 0.15, 0.3))
  // Big pluck chord
  let chordT = t0 + 0.55
  for (let f of [1047, 1319, 1568, 2093]) pluck(c, f, chordT, 0.14, 1.0)
  // Shimmer
  pluck(c, 2637, chordT + 0.08, 0.08, 0.7)
  pluck(c, 3136, chordT + 0.14, 0.06, 0.6)
}
</script>
